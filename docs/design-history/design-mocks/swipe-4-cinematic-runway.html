<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Browse — Percho</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#080808;--ink:#f5f5f3;--muted:#7d7d76;--accent:#d8ff3d;--line:rgba(255,255,255,0.1)}
  *{box-sizing:border-box} html,body{margin:0;background:#000;color:var(--ink);font-family:'Geist',sans-serif;font-weight:400;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
  .mono{font-family:'Geist Mono',monospace}
  a{color:inherit;text-decoration:none}

  .deck{height:100dvh;width:100vw;position:relative;overflow:hidden;background:#000;display:flex;justify-content:center}
  .stage{position:relative;width:100%;max-width:560px;height:100%;background:#000;overflow:hidden}

  .card{position:absolute;inset:0;transition:transform .5s ease,opacity .5s ease}
  .card .img{position:absolute;inset:0;background-size:cover;background-position:center;animation:kb 12s ease-in-out infinite alternate}
  @keyframes kb{from{transform:scale(1.05)}to{transform:scale(1.18) translate(-3%,2%)}}
  .card::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.6) 0%,rgba(0,0,0,0.05) 22%,rgba(0,0,0,0.05) 50%,rgba(0,0,0,0.92) 100%);z-index:1}
  .card::after{content:"";position:absolute;inset:0;box-shadow:inset 0 0 0 1px rgba(255,255,255,0.04);pointer-events:none;z-index:2}

  /* TOP */
  .top{position:absolute;top:0;left:0;right:0;z-index:10;padding:env(safe-area-inset-top,16px) 18px 12px;display:flex;align-items:center;justify-content:space-between}
  .top .brand{font-family:'Geist Mono',monospace;font-size:13px;letter-spacing:0.06em}
  .top .filters{display:flex;gap:6px;font-family:'Geist Mono',monospace;font-size:11px;color:#fff;letter-spacing:0.06em}
  .top .filters a{padding:5px 10px;border:1px solid rgba(255,255,255,0.2);border-radius:999px}
  .top .filters a.on{background:var(--accent);color:#000;border-color:var(--accent)}
  .top .menu{font-family:'Geist Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:0.12em}

  /* timecode + progress */
  .progress{position:absolute;top:calc(env(safe-area-inset-top,16px) + 50px);left:18px;right:18px;z-index:11;display:flex;gap:3px}
  .progress span{flex:1;height:1px;background:rgba(255,255,255,0.14)}
  .progress span.on{background:var(--accent);box-shadow:0 0 6px var(--accent)}
  .timecode{position:absolute;top:calc(env(safe-area-inset-top,16px) + 60px);right:18px;z-index:11;font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:0.12em;color:var(--accent)}

  /* AGENT */
  .agent-tag{position:absolute;top:88px;left:18px;z-index:9;display:flex;align-items:center;gap:10px;background:rgba(0,0,0,0.55);backdrop-filter:blur(14px) saturate(140%);border:1px solid var(--line);padding:6px 14px 6px 6px;border-radius:999px}
  .agent-tag img{width:28px;height:28px;border-radius:50%;object-fit:cover}
  .agent-tag .label{font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent);line-height:1}
  .agent-tag .name{font-size:13px;font-weight:500;line-height:1.2;margin-top:2px}

  /* meta block — left-aligned, monospace ID + huge price */
  .meta{position:absolute;left:18px;right:88px;bottom:118px;z-index:5}
  .meta .id{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent)}
  .meta .badge{display:inline-block;font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:0.22em;text-transform:uppercase;background:var(--accent);color:#000;padding:4px 8px;font-weight:600;margin-left:8px}
  .meta .price{font-family:'Geist',sans-serif;font-weight:300;font-size:64px;line-height:0.95;letter-spacing:-0.045em;color:#fff;margin-top:10px}
  .meta .price b{font-weight:600;color:var(--accent)}
  .meta .addr{font-family:'Geist',sans-serif;font-weight:400;font-size:18px;color:#fff;margin-top:8px;letter-spacing:-0.01em}
  .meta .addr b{font-weight:600}
  .meta .specs{font-family:'Geist Mono',monospace;font-size:11px;color:rgba(255,255,255,0.85);margin-top:10px;letter-spacing:0.06em}
  .meta .tagchips{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;font-family:'Geist Mono',monospace}
  .meta .tagchips span{font-size:10px;letter-spacing:0.06em;color:rgba(255,255,255,0.85);border:1px solid var(--line);padding:4px 9px;border-radius:999px}

  /* RAIL */
  .rail{position:absolute;right:14px;bottom:118px;z-index:6;display:flex;flex-direction:column;gap:14px;align-items:center}
  .rail .btn{width:50px;height:50px;border-radius:50%;background:rgba(0,0,0,0.55);backdrop-filter:blur(14px) saturate(140%);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;font-family:'Geist Mono',monospace;font-size:11px;font-weight:500}
  .rail .btn:hover{border-color:var(--accent);color:var(--accent)}
  .rail .l{font-family:'Geist Mono',monospace;font-size:8px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);margin-top:3px;text-align:center}

  /* ACTIONS */
  .actions{position:absolute;left:0;right:0;bottom:0;z-index:7;padding:12px 18px calc(env(safe-area-inset-bottom,16px) + 12px);display:flex;justify-content:space-between;align-items:center;gap:12px;background:linear-gradient(180deg,rgba(0,0,0,0) 0%,rgba(0,0,0,0.85) 100%)}
  .actions .pass,.actions .save{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;background:rgba(255,255,255,0.05);border:1px solid var(--line);color:#fff;font-family:'Geist Mono',monospace}
  .actions .like{flex:1;height:54px;border-radius:999px;background:var(--accent);color:#000;display:flex;align-items:center;justify-content:center;gap:10px;font-family:'Geist Mono',monospace;font-size:13px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;cursor:pointer}

  .hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;font-family:'Geist Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:0.32em;text-transform:uppercase;pointer-events:none;animation:fade 4s ease-out forwards}
  @keyframes fade{0%{opacity:0}20%{opacity:1}80%{opacity:1}100%{opacity:0}}

  .behind1{transform:scale(0.96) translateY(8px);opacity:.5;filter:blur(2px)}
  .behind2{transform:scale(0.92) translateY(16px);opacity:.25;filter:blur(4px)}

  /* corner glyphs — runway/cinema vibe */
  .corner{position:absolute;font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:0.18em;color:var(--accent);z-index:9}
  .corner.tl{top:calc(env(safe-area-inset-top,16px) + 38px);left:18px}
  .corner.br{bottom:84px;right:18px;color:var(--muted)}

  @media(min-width:900px){
    .stage{margin:24px 0;border-left:1px solid var(--line);border-right:1px solid var(--line)}
    .deck{align-items:stretch;background:#0a0a0a}
  }
</style></head><body>

<div class="deck">
  <main class="stage" id="stage">
    <div class="top">
      <div class="brand">PERCHO ◯</div>
      <div class="filters"><a class="on">FOR.YOU</a><a>$3M+</a><a>EASTSIDE</a></div>
      <div class="menu">REC</div>
    </div>
    <div class="progress" id="progress"></div>
    <div class="timecode" id="timecode">N° 01 / 06</div>
    <div class="hint">[ scroll for next ]</div>
  </main>
</div>

<script src="_data.js"></script>
<script src="_swipe_data.js"></script>
<script>
  const stage=document.getElementById('stage'); const prog=document.getElementById('progress'); const tc=document.getElementById('timecode');
  let active=0; const N=SWIPE_FEED.length;
  prog.innerHTML=SWIPE_FEED.map((_,i)=>`<span class="${i===0?'on':''}"></span>`).join('');
  function render(){
    stage.querySelectorAll('.card,.corner').forEach(n=>n.remove());
    for(let off=2;off>=0;off--){
      const idx=(active+off)%N; const L=SWIPE_FEED[idx];
      const cls=off===0?'':(off===1?'behind1':'behind2');
      const card=document.createElement('div'); card.className='card '+cls;
      card.innerHTML=`
        <div class="img" style="background-image:url(${L.angles[0].replace('w=1600','w=1800')})"></div>
        ${off===0?`
        <div class="corner tl">[ REC ● LIVE ]</div>
        <div class="corner br">${L.style.toUpperCase()} / ${L.community.toUpperCase()}</div>
        <div class="agent-tag"><img src="${L.agent.avatar}" alt=""/>
          <div><div class="label">LISTED BY</div><div class="name">${L.agent.name}</div></div>
        </div>
        <div class="meta">
          <span class="id">[ N° ${String(active+1).padStart(2,'0')} / ${L.style.toUpperCase()} ]</span>
          ${L.status==='Just Listed'?`<span class="badge">NEW</span>`:''}
          <div class="price">${fmtPrice(L.price).replace('$','$').replace('M','<b>M</b>')}</div>
          <div class="addr">${L.address.split(' ').slice(0,1)[0]} <b>${L.address.split(' ').slice(1).join(' ')}</b></div>
          <div class="specs">${L.beds} BD · ${L.baths} BA · ${L.sqft.toLocaleString()} SQFT · ${L.year_built||L.community}</div>
          <div class="tagchips"><span>${L.schools}</span><span>${L.commute}</span></div>
        </div>
        <div class="rail">
          <div><div class="btn">S</div><div class="l">School</div></div>
          <div><div class="btn">C</div><div class="l">Commute</div></div>
          <div><div class="btn">P</div><div class="l">Parks</div></div>
          <div><div class="btn">M</div><div class="l">Map</div></div>
        </div>
        <div class="actions">
          <div class="pass">✕</div>
          <div class="like">♥ &nbsp;Save → Shortlist</div>
          <div class="save">▶</div>
        </div>`:''}
      `;
      stage.appendChild(card);
    }
    prog.innerHTML=SWIPE_FEED.map((_,i)=>`<span class="${i===active?'on':''}"></span>`).join('');
    tc.textContent=`N° ${String(active+1).padStart(2,'0')} / ${String(N).padStart(2,'0')}`;
  }
  render();
  stage.addEventListener('click',e=>{if(e.target.closest('.actions')||e.target.closest('.rail')||e.target.closest('.top'))return; active=(active+1)%N;render();});
  let acc=0;
  stage.addEventListener('wheel',e=>{acc+=e.deltaY;if(acc>120){active=(active+1)%N;render();acc=0}else if(acc<-120){active=(active-1+N)%N;render();acc=0}});
</script></body></html>
