<!doctype html>
<html><head><meta charset="utf-8"><title>Listing captions · Variant B — Cinematic minimal (VO-ready)</title>
<style>
  * { box-sizing: border-box; margin:0; padding:0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0d0f14; color: #e5e7eb; min-height:100vh;
    display:flex; flex-direction:column; align-items:center; padding: 32px 16px 64px; }
  h1 { font-size: 22px; font-weight:600; letter-spacing:-0.01em; margin-bottom:6px; }
  .stance { color:#94a3b8; font-size:14px; margin-bottom:28px; max-width:520px; text-align:center; line-height:1.5; }
  .frame { width:320px; height:568px; border-radius: 36px; overflow:hidden;
    position:relative; box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 8px #1c1f29, 0 0 0 10px #2a2f3d;
    background:#000; }
  .frame img.bg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .frame .notch { position:absolute; top:14px; left:50%; transform:translateX(-50%);
    width:96px; height:26px; background:#000; border-radius: 20px; z-index:100; }
  /* Universal progress bars (matches nearby videos) */
  .progress { position:absolute; top:16px; left:28px; right:28px; z-index:20;
    display:flex; gap:4px; }
  .progress span { flex:1; height:3px; background:rgba(255,255,255,0.28); border-radius:3px; }
  .progress span.done { background:rgba(255,255,255,0.92); }
  .progress span.now { background:rgba(255,255,255,0.55);
    background-image: linear-gradient(90deg, rgba(255,255,255,0.95) 55%, rgba(255,255,255,0.28) 55%); }
  .caveat { margin-top:20px; color:#64748b; font-size:12px; max-width:320px; line-height:1.55; text-align:left; }
  
  .B-chip { position:absolute; bottom:36px; left:24px; z-index:10;
    padding: 10px 18px; border-radius: 999px;
    background: rgba(10,15,25,0.55); backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.14);
    display:inline-flex; align-items:center; gap:10px; color:#fff; }
  .B-chip .dot { width:6px; height:6px; border-radius:50%; background:#22D3EE; box-shadow: 0 0 8px #22D3EE; }
  .B-chip .price { font-size:15px; font-weight:600; letter-spacing:-0.005em; }
  .B-chip .sep { width:1px; height:12px; background:rgba(255,255,255,0.22); }
  .B-chip .meta { font-size:11px; color:rgba(255,255,255,0.75); letter-spacing:0.02em; }
  .B-cap { position:absolute; bottom:36px; right:24px; z-index:10;
    font-size:10px; text-transform:uppercase; letter-spacing:0.24em; color:rgba(255,255,255,0.55);
    text-shadow: 0 1px 4px rgba(0,0,0,0.6); }

</style></head>
<body>
  <h1>Listing captions · Variant B — Cinematic minimal (VO-ready)</h1>
  <div class="stance">Sub-30% pixel coverage. Frosted-glass pill + tiny chapter marker. Assumes voice-over will carry the info — screen gets out of the way so the photo does the emotional work.</div>
  <div class="frame">
    <img class="bg" src="https://tavmbcghxjeyaoptndvn.supabase.co/storage/v1/object/public/listing-photos/c7435419-e5ad-4abb-9f01-83bfc753d0cd/b4745b22-e4e8-4c0d-ad1d-031bd9c1c6d6.jpg" alt=""/>
    <div class="notch"></div>
    <div class="progress"><span class="done"></span><span class="now"></span><span></span><span></span><span></span><span></span></div>
    
  <div class="B-chip">
    <span class="dot"></span>
    <span class="price">$968,000</span>
    <span class="sep"></span>
    <span class="meta">4bd · 4ba · 3,302</span>
  </div>
  <div class="B-cap">Exterior · 01</div>

  </div>
</body></html>
