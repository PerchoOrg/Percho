<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Browse — Vicinity</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300;1,8..60,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f3eee7;--ink:#313131;--ink2:#5a5651;--muted:#8a857d;--line:rgba(49,49,49,0.16)}
  *{box-sizing:border-box} html,body{margin:0;background:var(--bg);color:var(--ink);font-family:'Source Serif 4',serif;font-weight:400;-webkit-font-smoothing:antialiased;overscroll-behavior:none;font-size:16px}
  .sans{font-family:'Inter',sans-serif}
  .eyebrow{font-family:'Inter',sans-serif;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;font-weight:500;color:var(--ink2)}
  a{color:inherit;text-decoration:none}

  .deck{height:100dvh;width:100vw;position:relative;overflow:hidden;display:flex;justify-content:center;background:var(--bg)}
  .stage{position:relative;width:min(540px,100%);height:100%;background:var(--bg);overflow:hidden}

  /* TOP — Aman style: hamburger, centered serif wordmark, eyebrow */
  .top{position:absolute;top:0;left:0;right:0;z-index:10;padding:env(safe-area-inset-top,18px) 22px 14px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;background:linear-gradient(180deg,rgba(243,238,231,0.95) 0%,rgba(243,238,231,0) 100%);backdrop-filter:blur(8px)}
  .top .menu{font-family:'Inter',sans-serif;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--ink);font-weight:500}
  .top .brand{font-family:'Source Serif 4',serif;font-weight:300;font-size:21px;letter-spacing:0.04em;text-align:center;color:var(--ink)}
  .top .saved{justify-self:end;font-family:'Inter',sans-serif;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--ink);font-weight:500}

  /* progress — thin warm grey */
  .progress{position:absolute;top:calc(env(safe-area-inset-top,18px) + 56px);left:22px;right:22px;z-index:11;display:flex;gap:3px}
  .progress span{flex:1;height:1px;background:rgba(49,49,49,0.18)}
  .progress span.on{background:var(--ink)}

  /* CARD — frame in cream, image inside with margin (gallery print style) */
  .card{position:absolute;inset:0;transition:transform .55s ease,opacity .55s ease;display:flex;flex-direction:column;padding:96px 28px 200px}
  .card .img-wrap{flex:1;position:relative;background:#000;overflow:hidden}
  .card .img{position:absolute;inset:0;background-size:cover;background-position:center;animation:kb 16s ease-in-out infinite alternate}
  @keyframes kb{from{transform:scale(1.04)}to{transform:scale(1.16) translate(2%,-2%)}}
  .card .img-wrap::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 60%,rgba(0,0,0,0.4) 100%);pointer-events:none}

  /* AGENT TAG — small, top-left of image */
  .agent-tag{position:absolute;top:14px;left:14px;z-index:6;display:flex;align-items:center;gap:10px;background:rgba(243,238,231,0.92);backdrop-filter:blur(8px);padding:5px 14px 5px 5px;border:1px solid rgba(49,49,49,0.1)}
  .agent-tag img{width:26px;height:26px;border-radius:50%;object-fit:cover}
  .agent-tag .l{font-family:'Inter',sans-serif;font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);line-height:1;font-weight:500}
  .agent-tag .n{font-family:'Source Serif 4',serif;font-weight:400;font-size:13px;line-height:1.2;margin-top:3px;color:var(--ink)}

  /* META — under image, in cream margin (like print caption) */
  .meta{position:absolute;left:28px;right:28px;bottom:120px;z-index:5;display:grid;grid-template-columns:1fr auto;gap:14px;align-items:end}
  .meta .l-col .num{font-family:'Inter',sans-serif;font-size:9px;letter-spacing:0.32em;text-transform:uppercase;color:var(--muted);font-weight:500}
  .meta .l-col .badge{display:inline-block;font-family:'Inter',sans-serif;font-size:9px;letter-spacing:0.22em;text-transform:uppercase;background:var(--ink);color:var(--bg);padding:3px 8px;font-weight:500;margin-left:8px}
  .meta .l-col .addr{font-family:'Source Serif 4',serif;font-weight:300;font-size:26px;line-height:1.15;letter-spacing:-0.01em;color:var(--ink);margin-top:8px}
  .meta .l-col .addr .it{font-style:italic}
  .meta .l-col .specs{font-family:'Inter',sans-serif;font-size:11px;letter-spacing:0.06em;color:var(--ink2);margin-top:8px}
  .meta .r-col .price{font-family:'Source Serif 4',serif;font-weight:300;font-size:32px;line-height:1;letter-spacing:-0.02em;color:var(--ink);text-align:right}
  .meta .r-col .ppsf{font-family:'Inter',sans-serif;font-size:10px;color:var(--muted);text-align:right;margin-top:4px;letter-spacing:0.06em}

  /* RAIL — pill chips on the right edge of image */
  .rail{position:absolute;right:14px;top:50%;transform:translateY(-50%);z-index:6;display:flex;flex-direction:column;gap:10px;align-items:flex-end}
  .rail .btn{background:rgba(243,238,231,0.92);backdrop-filter:blur(8px);border:1px solid rgba(49,49,49,0.12);padding:7px 14px;font-family:'Inter',sans-serif;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink);font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px}
  .rail .btn:hover{background:#fff;border-color:var(--ink)}
  .rail .btn .v{font-family:'Source Serif 4',serif;font-weight:400;text-transform:none;letter-spacing:0;font-size:11px}

  /* ACTIONS — bottom bar in cream */
  .actions{position:absolute;left:0;right:0;bottom:0;z-index:7;padding:18px 22px calc(env(safe-area-inset-bottom,18px) + 18px);display:flex;justify-content:space-between;align-items:center;gap:12px;background:linear-gradient(180deg,rgba(243,238,231,0) 0%,rgba(243,238,231,0.96) 30%,rgba(243,238,231,1) 100%);border-top:1px solid var(--line)}
  .actions .pass,.actions .save{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;background:transparent;border:1px solid var(--line);color:var(--ink);font-family:'Source Serif 4',serif}
  .actions .pass:hover,.actions .save:hover{background:#fff;border-color:var(--ink)}
  .actions .like{flex:1;height:54px;background:var(--ink);color:var(--bg);display:flex;align-items:center;justify-content:center;gap:10px;font-family:'Inter',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.22em;text-transform:uppercase;cursor:pointer}
  .actions .like::before{content:"♡";font-family:serif;font-size:16px;font-weight:400}

  .hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;font-family:'Source Serif 4',serif;font-style:italic;font-weight:300;font-size:14px;color:rgba(255,255,255,0.95);letter-spacing:0.04em;pointer-events:none;animation:fade 4s ease-out forwards;text-shadow:0 1px 8px rgba(0,0,0,0.4)}
  @keyframes fade{0%{opacity:0}20%{opacity:1}80%{opacity:1}100%{opacity:0}}

  .behind1{transform:scale(0.97) translateY(8px);opacity:.4}
  .behind2{transform:scale(0.94) translateY(16px);opacity:.2}

  @media(min-width:900px){
    .deck{align-items:center;background:radial-gradient(circle at 50% 30%,#faf6ee 0%,#e8e0d2 80%)}
    .stage{box-shadow:0 30px 80px rgba(49,49,49,0.18);margin:24px;height:calc(100% - 48px);border:1px solid var(--line)}
  }
</style></head><body>

<div class="deck">
  <main class="stage" id="stage">
    <div class="top">
      <div class="menu">☰ Menu</div>
      <div class="brand">Vicinity</div>
      <div class="saved">Saved · 3</div>
    </div>
    <div class="progress" id="progress"></div>
    <div class="hint">— tap or scroll for the next residence —</div>
  </main>
</div>

<script src="_data.js"></script>
<script src="_swipe_data.js"></script>
<script>
  const stage=document.getElementById('stage'); const prog=document.getElementById('progress');
  let active=0; const N=SWIPE_FEED.length;
  prog.innerHTML=SWIPE_FEED.map((_,i)=>`<span class="${i===0?'on':''}"></span>`).join('');
  function render(){
    stage.querySelectorAll('.card').forEach(n=>n.remove());
    for(let off=2;off>=0;off--){
      const idx=(active+off)%N; const L=SWIPE_FEED[idx]; const ppsf=Math.round(L.price/L.sqft);
      const cls=off===0?'':(off===1?'behind1':'behind2');
      const card=document.createElement('div'); card.className='card '+cls;
      card.innerHTML=`
        <div class="img-wrap">
          <div class="img" style="background-image:url(${L.angles[0].replace('w=1600','w=1800')})"></div>
          ${off===0?`
          <div class="agent-tag"><img src="${L.agent.avatar}" alt=""/>
            <div><div class="l">Listed by</div><div class="n">${L.agent.name}</div></div>
          </div>
          <div class="rail">
            <div class="btn"><span>School</span><span class="v">${L.schools.split(' · ')[1]||'—'}</span></div>
            <div class="btn"><span>Commute</span><span class="v">${L.commute.replace(' to ',' → ')}</span></div>
            <div class="btn"><span>Parks</span><span class="v">2 nearby</span></div>
          </div>`:''}
        </div>
        ${off===0?`
        <div class="meta">
          <div class="l-col">
            <span class="num">No. ${String(active+1).padStart(2,'0')} · ${L.community}</span>
            ${L.status==='Just Listed'?`<span class="badge">Just Listed</span>`:''}
            <div class="addr">${L.address.split(',')[0]}<br/><span class="it">${L.style}</span></div>
            <div class="specs">${L.beds} BD &nbsp;·&nbsp; ${L.baths} BA &nbsp;·&nbsp; ${L.sqft.toLocaleString()} SF</div>
          </div>
          <div class="r-col">
            <div class="price">${fmtPrice(L.price)}</div>
            <div class="ppsf">$${ppsf.toLocaleString()} / sf</div>
          </div>
        </div>
        <div class="actions">
          <div class="pass">✕</div>
          <div class="like">Save to Shortlist</div>
          <div class="save">▶</div>
        </div>`:''}
      `;
      stage.appendChild(card);
    }
    prog.innerHTML=SWIPE_FEED.map((_,i)=>`<span class="${i===active?'on':''}"></span>`).join('');
  }
  render();
  stage.addEventListener('click',e=>{if(e.target.closest('.actions')||e.target.closest('.rail')||e.target.closest('.top'))return; active=(active+1)%N;render();});
  let acc=0; stage.addEventListener('wheel',e=>{acc+=e.deltaY;if(acc>120){active=(active+1)%N;render();acc=0}else if(acc<-120){active=(active-1+N)%N;render();acc=0}});
</script></body></html>
