# Supabase CLI project config.
# Generated by `supabase init` then trimmed to V1 essentials.

project_id = "vicinity"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://vicinities.cc", "https://*.vercel.app"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false  # V1 uses magic links, not email confirmation
secure_password_change = true

[storage]
enabled = true
file_size_limit = "50MiB"
